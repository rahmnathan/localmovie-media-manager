# Gateway API HTTPRoute for LocalMovies
# Replaces ingress.yaml

apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: localmovies
spec:
  parentRefs:
    - name: main-gateway
      namespace: envoy-gateway-system
  hostnames:
    - movies.nathanrahm.com
  rules:
    # Block /actuator externally (no backendRefs = 500)
    # Internal Prometheus scraping goes direct to pod IP, bypassing gateway
    - matches:
        - path:
            type: PathPrefix
            value: /actuator

    # Default route
    - backendRefs:
        - name: localmovies
          port: 8080
